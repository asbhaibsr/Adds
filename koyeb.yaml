name: viral-streak-bot

services:
  - name: viral-bot
    type: web
    run-command: python run.py
    instance-type: eco
    ports:
      - port: 8080
        protocol: http
    routes:
      - path: /
        port: 8080
      - path: /api
        port: 8080
      - path: /admin_panel
        port: 8080
      - path: /health
        port: 8080
    health-checks:
      - type: http
        port: 8080
        path: /health
        interval: 30s
        timeout: 10s
    env:
      - name: PORT
        value: "8080"
      - name: API_ID
        value: "29970536"
      - name: API_HASH
        value: "f4bfdcdd4a5c1b7328a7e4f25f024a09"
      - name: OWNER_ID
        value: "7315805581"
      - name: ADMIN_CHANNEL_ID
        value: "-1002717243409"
      - name: DATABASE_CHANNEL_ID
        value: "-1002717243409"
      - name: FLASK_SECRET_KEY
        value: "viralbot-super-secret-key-2025"
      - name: POST_INTERVAL_MINUTES
        value: "30"
      - name: BROADCAST_ROUNDS
        value: "2"
      - name: ROUND2_AFTER_HOURS
        value: "24"
      - name: MEGA_BROADCAST_TIMES
        value: "09:00,21:00"
      - name: FLOOD_WAIT_SLEEP_MIN
        value: "10"
      - name: FLOOD_WAIT_SLEEP_MAX
        value: "20"
      - name: COPYRIGHT_DELETE_MINUTES
        value: "7"
      - name: DEV_MODE
        value: "false"
      # ── Koyeb dashboard mein Secret env vars SET karo ──
      # BOT_TOKEN    = BotFather se bot token
      # BOT_USERNAME = bot username (without @)
      # MONGO_URI    = MongoDB Atlas connection string
